# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake on a single platform

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
  workflow_dispatch:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  CMAKE_GENERATOR: "Visual Studio 17 2022"

jobs:
  build:
    name: Build and Test Production-Lens-Validation Tool on Windows
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        aqtversion: '==3.1.*'
        version: '6.10.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        install-location: ${{github.workspace}}/Qt
        cache: true
    
    - name: Install OpenCV
      run: |
        $opencvUrl = "https://github.com/opencv/opencv/releases/download/4.12.0/opencv-4.12.0-windows.exe"
        Invoke-WebRequest -Uri $opencvUrl -OutFile opencv.exe
        Start-Process opencv.exe -ArgumentList "/S","/D=${{ github.workspace }}" -Wait
      shell: pwsh

    - name: Configure CMake
      run: |
        cmake -B build -G "${{ env.CMAKE_GENERATOR }}" -A x64 `
          -DOpenCV_DIR="${{ github.workspace }}\opencv\build" `
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}\Qt\6.10.0\msvc2022_64"`
          -DCAMERA_SDK_PATH="${{ github.workspace }}\CameraSDK"
      shell: pwsh

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      # Execute tests defined by the CMake configuration.
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest -C ${{env.BUILD_TYPE}}